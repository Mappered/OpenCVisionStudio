name: Sync Aravis Subtree

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Aravis branch to sync from'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature/Aravis branch
        uses: actions/checkout@v3
        with:
          ref: feature/Aravis
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync Aravis Subtree
        run: |
          git subtree pull --prefix aravis https://github.com/AravisProject/aravis.git ${{ github.event.inputs.branch || 'main' }} --squash

      - name: Push Changes
        run: |
          git push origin feature/Aravis

      - name: Create Summary
        run: |
          echo "✅ Aravis subtree synced successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.event.inputs.branch || 'main' }}" >> $GITHUB_STEP_SUMMARY
