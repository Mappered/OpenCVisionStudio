name: Create Release or Hotfix

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - release
          - hotfix
      version_number:
        description: 'Version number (optional, auto-increments if empty)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: windows-latest
    steps:
      - name: Configure Git
        shell: pwsh
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git clone --no-checkout ${{ github.server_url }}/${{ github.repository }}.git .
          git fetch --all --tags

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.version_number }}" -eq "") {
            $LAST_TAG = git describe --tags --abbrev=0 2>$null
            if ($LASTEXITCODE -ne 0) { $LAST_TAG = "0.0.0.0" }
            Write-Output "Last tag: $LAST_TAG"
            
            $parts = $LAST_TAG -split '\.' | ForEach-Object { [int]$_ }
            if ("${{ inputs.release_type }}" -eq "release") {
              $parts[1]++
              $parts[2] = 0
              $parts[3] = 0
            } else {
              $parts[2]++
              $parts[3] = 0
            }
            $VERSION = $parts -join '.'
          } else {
            $VERSION = "${{ inputs.version_number }}"
          }
          
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$VERSION"
          Write-Output "Determined version: $VERSION"

      - name: Create Release Branch
        if: inputs.release_type == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -B Develop origin/Develop
          git checkout -B "Release/${{ steps.version.outputs.version }}"
          git commit --allow-empty -m "Release: Version ${{ steps.version.outputs.version }}"
          git push https://git:${GH_TOKEN}@github.com/${{ github.repository }}.git "Release/${{ steps.version.outputs.version }}"

      - name: Create Hotfix Branch
        if: inputs.release_type == 'hotfix'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -B Master origin/Master
          git checkout -B "Hotfix/${{ steps.version.outputs.version }}"
          git commit --allow-empty -m "Hotfix: Version ${{ steps.version.outputs.version }}"
          git push https://git:${GH_TOKEN}@github.com/${{ github.repository }}.git "Hotfix/${{ steps.version.outputs.version }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          if ("${{ inputs.release_type }}" -eq "release") {
            $BRANCH_NAME = "Release/${{ steps.version.outputs.version }}"
          } else {
            $BRANCH_NAME = "Hotfix/${{ steps.version.outputs.version }}"
          }
          
          gh pr create `
            --base master `
            --head $BRANCH_NAME `
            --title "${{ inputs.release_type }}: ${{ steps.version.outputs.version }}" `
            --body "Automated ${{ inputs.release_type }} PR for version ${{ steps.version.outputs.version }}"

      - name: Workflow Summary
        shell: pwsh
        run: |
          "Release/Hotfix branch created successfully!" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "**Type:** ${{ inputs.release_type }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "**Version:** ${{ steps.version.outputs.version }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          if ("${{ inputs.release_type }}" -eq "release") {
            "**Branch:** Release/${{ steps.version.outputs.version }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          } else {
            "**Branch:** Hotfix/${{ steps.version.outputs.version }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
